# Demonstrates multiple item types with pattern priority.
#
# Items are tried in configuration order; the first matching pattern
# wins.  Place more specific patterns before general catch-all patterns.
#
# This config parses a web server log that contains three distinct
# entry types: HTTP requests, health-check pings, and general messages.

[general]
index_threshold = 1

[atoms]
timestamp = "\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}"
method    = "GET|POST|PUT|DELETE|PATCH|HEAD"
path      = "/[^ ]*"
status    = "\\d{3}"
level     = "INFO|WARN|ERROR|DEBUG"
message   = ".+"

# Most specific: health-check requests (exact path)
# e.g.: 2024-01-15 09:30:00 GET /healthz 200
# Timestamps vary between runs, so each item marks everything else
# with include_for_match to keep timestamps out of the signature.
[[items]]
name = "health_check"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "method"
include_for_match = true
[[items.parts]]
regex = " /healthz "
[[items.parts]]
atom = "status"
include_for_match = true

# HTTP requests (any path)
# e.g.: 2024-01-15 09:30:00 POST /api/users 201
[[items]]
name = "http_request"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "method"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "path"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "status"
include_for_match = true

# Catch-all: general log messages
# e.g.: 2024-01-15 09:30:00 INFO Server started on port 8080
[[items]]
name = "general_log"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "level"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "message"
include_for_match = true
