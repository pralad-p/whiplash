# Demonstrates multiline patterns: items that span more than one line.
#
# Multi-line items require `general.delimiters`: the log is split into
# blocks at delimiter lines, and an item pattern must match a whole block.
# Useful for log formats where entries include continuation lines,
# such as Java stack traces or multi-line SQL queries.
#
# Matches blocks like:
#   2024-01-15 09:30:00 ERROR NullPointerException
#     at com.example.App.main(App.java:42)
#
# separated by blank lines.

[general]
delimiters = "^$"

[atoms]
timestamp  = "\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}"
level      = "INFO|WARN|ERROR"
exception  = "[A-Za-z.]+"
stacktrace = "  at .+"

[[items]]
name = "log_entry"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "level"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "exception"
[[items.parts]]
regex = "\\n"
[[items.parts]]
atom = "stacktrace"
