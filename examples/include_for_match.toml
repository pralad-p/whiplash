# Demonstrates per-part include_for_match: opt an item into whitelist
# matching, where only the marked parts' values enter the matching
# signature.
#
# Here, HTTP request logs match on method, path, and status only
# (timestamp and response_time vary between runs), while error logs
# compare all atoms.

[atoms]
timestamp     = "\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}"
method        = "GET|POST|PUT|DELETE|PATCH"
path          = "/[^ ]+"
status        = "\\d{3}"
response_time = "\\d+ms"
level         = "ERROR|WARN"
message       = ".+"

# Matches: 2024-01-15 09:30:00 GET /api/users 200 45ms
[[items]]
name = "http_request"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "method"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "path"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "status"
include_for_match = true
[[items.parts]]
regex = " "
[[items.parts]]
atom = "response_time"

# Matches: 2024-01-15 09:30:00 ERROR Database connection lost
# No include_for_match parts, so all captured atoms enter the signature.
[[items]]
name = "error_entry"
[[items.parts]]
atom = "timestamp"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "level"
[[items.parts]]
regex = " "
[[items.parts]]
atom = "message"
